name: Release

on:
  push:
    tags: ["v*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes

  update-tap:
    name: Update homebrew tap
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Compute sha256 of release tarball
        id: sha
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          URL="https://github.com/dove-tools/thruline/archive/refs/tags/${VERSION}.tar.gz"
          # Retry up to 5 times — tarball may take a moment after release creation
          for i in $(seq 1 5); do
            SHA=$(curl -sL "$URL" | shasum -a 256 | cut -d' ' -f1)
            [ -n "$SHA" ] && break
            sleep 10
          done
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Update formula in homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
          URL: ${{ steps.sha.outputs.url }}
        run: |
          # Fetch current formula and its blob SHA
          RESPONSE=$(gh api repos/dove-tools/homebrew-tap/contents/Formula/thruline.rb)
          BLOB_SHA=$(echo "$RESPONSE" | jq -r '.sha')
          CONTENT=$(echo "$RESPONSE" | jq -r '.content' | base64 -d)

          # Update url and sha256 lines
          NEW_CONTENT=$(echo "$CONTENT" \
            | sed "s|url \".*\"|url \"$URL\"|" \
            | sed "s|sha256 \".*\"|sha256 \"$SHA256\"|")

          # Push updated formula
          gh api repos/dove-tools/homebrew-tap/contents/Formula/thruline.rb \
            --method PUT \
            --field message="thruline: update to $VERSION" \
            --field content="$(echo "$NEW_CONTENT" | base64)" \
            --field sha="$BLOB_SHA"
